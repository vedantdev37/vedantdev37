name: Update README

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: {}       # allow manual runs from the Actions tab
  push:
    branches: [main]
    paths:
      - "generate.py"
      - "scripts/**"
      - "profile.jpg"
      - ".github/workflows/update-readme.yml"

# Required so the workflow can push the regenerated files back to the repo.
permissions:
  contents: write

# Avoid overlapping runs racing to push.
concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate ASCII art
        run: python generate.py

      - name: Update profile stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain README.md ascii_art.txt)" ]; then
            git add README.md ascii_art.txt
            git commit -m "chore: auto-update profile README [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
